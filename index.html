<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>tgwebview Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #000000);
    --hint: var(--tg-theme-hint-color, #999999);
    --link: var(--tg-theme-link-color, #168acd);
    --btn: var(--tg-theme-button-color, #40a7e3);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --sec-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
    --section-bg: var(--tg-theme-section-bg-color, #ffffff);
    --section-header: var(--tg-theme-section-header-text-color, #168acd);
    --subtitle: var(--tg-theme-subtitle-text-color, #999999);
    --destructive: var(--tg-theme-destructive-text-color, #d14e4e);
    --separator: var(--tg-theme-section-separator-color, #e7e7e7);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-top: 60px;
    padding-bottom: 100px;
    -webkit-user-select: none;
    user-select: none;
  }

  .section {
    background: var(--section-bg);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--separator);
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--section-header);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--separator);
    font-size: 14px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--hint); }
  .info-value { color: var(--text); font-weight: 500; max-width: 60%; text-align: right; word-break: break-all; }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-grid-3 {
    grid-template-columns: 1fr 1fr 1fr;
  }
  .btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .btn:active { opacity: 0.7; }
  .btn-outline {
    background: transparent;
    color: var(--btn);
    border: 1.5px solid var(--btn);
  }
  .btn-danger {
    background: var(--destructive);
    color: #fff;
  }
  .btn-full {
    grid-column: 1 / -1;
  }

  .log-area {
    background: var(--sec-bg);
    border-radius: 8px;
    padding: 10px;
    margin-top: 10px;
    font-size: 12px;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    color: var(--text);
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-area:empty { display: none; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .input-row input {
    flex: 1;
    background: var(--sec-bg);
    border: 1px solid var(--separator);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    outline: none;
  }
  .input-row input::placeholder { color: var(--hint); }

  .tag {
    display: inline-block;
    background: var(--sec-bg);
    color: var(--hint);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 6px;
    font-weight: 500;
    vertical-align: middle;
  }
  .tag-ok { background: #d4edda; color: #155724; }
  .tag-err { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>

<!-- Init Data -->
<div class="section" id="s-init">
  <div class="section-title">Init Data</div>
  <div id="init-info"></div>
</div>

<!-- Theme -->
<div class="section">
  <div class="section-title">Theme</div>
  <div id="theme-info"></div>
  <div class="btn-grid" style="margin-top:10px">
    <button class="btn" onclick="setHeader('#2e7d32')">Header Green</button>
    <button class="btn" onclick="setHeader('#1565c0')">Header Blue</button>
    <button class="btn" onclick="setHeader('#000000')">Header Black</button>
    <button class="btn" onclick="setHeader('#ffffff')">Header White</button>
    <button class="btn btn-outline" onclick="setBg('#1a1a2e')">BG Dark</button>
    <button class="btn btn-outline" onclick="setBg('#ffffff')">BG Light</button>
  </div>
</div>

<!-- Main Button -->
<div class="section">
  <div class="section-title">Main Button</div>
  <div class="btn-grid">
    <button class="btn" onclick="mainBtn('show')">Show</button>
    <button class="btn btn-outline" onclick="mainBtn('hide')">Hide</button>
    <button class="btn" onclick="mainBtn('progress')">Progress On</button>
    <button class="btn btn-outline" onclick="mainBtn('progress_off')">Progress Off</button>
    <button class="btn btn-full" onclick="mainBtn('text')">Set Text: "Continue"</button>
  </div>
  <div class="log-area" id="log-main"></div>
</div>

<!-- Back / Settings Buttons -->
<div class="section">
  <div class="section-title">Navigation Buttons</div>
  <div class="btn-grid">
    <button class="btn" onclick="backBtn('show')">Back: Show</button>
    <button class="btn btn-outline" onclick="backBtn('hide')">Back: Hide</button>
    <button class="btn" onclick="settingsBtn('show')">Settings: Show</button>
    <button class="btn btn-outline" onclick="settingsBtn('hide')">Settings: Hide</button>
  </div>
  <div class="log-area" id="log-nav"></div>
</div>

<!-- Popups / Alerts -->
<div class="section">
  <div class="section-title">Popups</div>
  <div class="btn-grid btn-grid-3">
    <button class="btn" onclick="testAlert()">Alert</button>
    <button class="btn" onclick="testConfirm()">Confirm</button>
    <button class="btn" onclick="testPopup()">Popup</button>
  </div>
  <div class="log-area" id="log-popup"></div>
</div>

<!-- QR / Clipboard -->
<div class="section">
  <div class="section-title">QR Scanner & Clipboard</div>
  <div class="btn-grid">
    <button class="btn" onclick="testQR()">Scan QR</button>
    <button class="btn" onclick="testClipboard()">Read Clipboard</button>
  </div>
  <div class="log-area" id="log-qr"></div>
</div>

<!-- CloudStorage -->
<div class="section">
  <div class="section-title">CloudStorage <span class="tag" id="cloud-tag">MTProto</span></div>
  <div class="input-row">
    <input id="cs-key" placeholder="key" value="test_key">
    <input id="cs-val" placeholder="value" value="hello world">
  </div>
  <div class="btn-grid">
    <button class="btn" onclick="csSave()">Save</button>
    <button class="btn" onclick="csGet()">Get</button>
    <button class="btn btn-outline" onclick="csKeys()">Get Keys</button>
    <button class="btn btn-danger" onclick="csDelete()">Delete</button>
  </div>
  <div class="log-area" id="log-cloud"></div>
</div>

<!-- Write Access -->
<div class="section">
  <div class="section-title">Write Access</div>
  <div class="btn-grid">
    <button class="btn btn-full" onclick="testWriteAccess()">Request Write Access</button>
  </div>
  <div class="log-area" id="log-write"></div>
</div>

<!-- Haptic Feedback -->
<div class="section">
  <div class="section-title">Haptic Feedback</div>
  <div class="btn-grid btn-grid-3">
    <button class="btn" onclick="haptic('impact','light')">Light</button>
    <button class="btn" onclick="haptic('impact','medium')">Medium</button>
    <button class="btn" onclick="haptic('impact','heavy')">Heavy</button>
    <button class="btn btn-outline" onclick="haptic('notification','success')">Success</button>
    <button class="btn btn-outline" onclick="haptic('notification','warning')">Warning</button>
    <button class="btn btn-outline" onclick="haptic('notification','error')">Error</button>
    <button class="btn btn-full" onclick="haptic('selection','')">Selection Changed</button>
  </div>
</div>

<!-- Biometry -->
<div class="section">
  <div class="section-title">Biometry</div>
  <div class="btn-grid">
    <button class="btn" onclick="bioInit()">Init</button>
    <button class="btn" onclick="bioAuth()">Authenticate</button>
  </div>
  <div class="log-area" id="log-bio"></div>
</div>

<!-- Location -->
<div class="section">
  <div class="section-title">Location Manager</div>
  <div class="btn-grid">
    <button class="btn" onclick="locInit()">Init</button>
    <button class="btn" onclick="locGet()">Get Location</button>
  </div>
  <div class="log-area" id="log-loc"></div>
</div>

<!-- Open Link -->
<div class="section">
  <div class="section-title">Links & Viewport</div>
  <div class="btn-grid">
    <button class="btn" onclick="testLink()">Open Link</button>
    <button class="btn btn-outline" onclick="testExpand()">Expand</button>
    <button class="btn btn-full" onclick="testClose()">Close Confirm</button>
  </div>
</div>

<!-- Invoke Custom Method -->
<div class="section">
  <div class="section-title">Invoke Custom Method</div>
  <div class="input-row">
    <input id="invoke-method" placeholder="method" value="getStorageValues">
    <input id="invoke-params" placeholder='{"keys":["k"]}' value='{"keys":["test_key"]}'>
  </div>
  <div class="btn-grid">
    <button class="btn btn-full" onclick="testInvoke()">Invoke</button>
  </div>
  <div class="log-area" id="log-invoke"></div>
</div>

<!-- Raw Event Log -->
<div class="section">
  <div class="section-title">Event Log</div>
  <div class="log-area" id="log-events" style="display:block;min-height:60px;"></div>
  <div class="btn-grid" style="margin-top:8px">
    <button class="btn btn-outline btn-full" onclick="document.getElementById('log-events').textContent=''">Clear</button>
  </div>
</div>

<script>
var tg = window.Telegram.WebApp;

// ─── Logging ───
function logTo(id, msg) {
  var el = document.getElementById(id);
  var time = new Date().toLocaleTimeString('en', {hour12:false});
  el.textContent += '[' + time + '] ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}
function elog(msg) { logTo('log-events', msg); }

// ─── Init Data ───
(function() {
  var info = document.getElementById('init-info');
  var rows = [
    ['Platform', tg.platform],
    ['Version', tg.version],
    ['Color Scheme', tg.colorScheme],
    ['Viewport Height', tg.viewportHeight + 'px'],
    ['Stable Height', tg.viewportStableHeight + 'px'],
    ['Expanded', tg.isExpanded],
    ['initData', tg.initData ? tg.initData.substring(0, 50) + '...' : '(empty)'],
    ['User', tg.initDataUnsafe.user ? JSON.stringify(tg.initDataUnsafe.user) : '(none)'],
  ];
  info.innerHTML = rows.map(function(r) {
    return '<div class="info-row"><span class="info-label">' + r[0] +
           '</span><span class="info-value">' + r[1] + '</span></div>';
  }).join('');
})();

// ─── Theme ───
(function() {
  var info = document.getElementById('theme-info');
  var tp = tg.themeParams;
  var keys = ['bg_color','text_color','hint_color','link_color','button_color',
              'button_text_color','secondary_bg_color','header_bg_color'];
  info.innerHTML = keys.map(function(k) {
    var v = tp[k] || '—';
    var swatch = v.startsWith('#') ?
      '<span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:'+v+';margin-right:6px;vertical-align:middle;border:1px solid rgba(0,0,0,0.1)"></span>' : '';
    return '<div class="info-row"><span class="info-label">' + k +
           '</span><span class="info-value">' + swatch + v + '</span></div>';
  }).join('');
})();

function setHeader(color) {
  tg.setHeaderColor(color);
  elog('setHeaderColor(' + color + ')');
}
function setBg(color) {
  tg.setBackgroundColor(color);
  elog('setBackgroundColor(' + color + ')');
}

// ─── Main Button ───
tg.MainButton.onClick(function() {
  logTo('log-main', 'MainButton clicked!');
  elog('MainButton.onClick fired');
});
function mainBtn(action) {
  switch(action) {
    case 'show': tg.MainButton.setText('Submit').show(); break;
    case 'hide': tg.MainButton.hide(); break;
    case 'progress': tg.MainButton.showProgress(true); break;
    case 'progress_off': tg.MainButton.hideProgress(); break;
    case 'text': tg.MainButton.setText('Continue'); break;
  }
  logTo('log-main', 'MainButton.' + action);
}

// ─── Back / Settings ───
tg.BackButton.onClick(function() {
  logTo('log-nav', 'BackButton clicked!');
  elog('BackButton.onClick fired');
});
tg.SettingsButton.onClick(function() {
  logTo('log-nav', 'SettingsButton clicked!');
  elog('SettingsButton.onClick fired');
});
function backBtn(action) {
  action === 'show' ? tg.BackButton.show() : tg.BackButton.hide();
  logTo('log-nav', 'BackButton.' + action);
}
function settingsBtn(action) {
  action === 'show' ? tg.SettingsButton.show() : tg.SettingsButton.hide();
  logTo('log-nav', 'SettingsButton.' + action);
}

// ─── Popups ───
function testAlert() {
  tg.showAlert('This is a test alert from tgwebview!', function() {
    logTo('log-popup', 'Alert closed');
  });
}
function testConfirm() {
  tg.showConfirm('Do you want to proceed?', function(ok) {
    logTo('log-popup', 'Confirm: ' + (ok ? 'YES' : 'NO'));
  });
}
function testPopup() {
  tg.showPopup({
    title: 'Choose Action',
    message: 'This is a test popup with multiple buttons.',
    buttons: [
      {id: 'save', type: 'default', text: 'Save'},
      {id: 'delete', type: 'destructive', text: 'Delete'},
      {id: 'cancel', type: 'cancel'},
    ]
  }, function(btnId) {
    logTo('log-popup', 'Popup button: ' + btnId);
  });
}

// ─── QR / Clipboard ───
function testQR() {
  tg.showScanQrPopup({text: 'Scan a QR code'}, function(data) {
    logTo('log-qr', 'QR result: ' + data);
    elog('QR scanned: ' + data);
    return true; // close scanner
  });
}
function testClipboard() {
  tg.readTextFromClipboard(function(text) {
    logTo('log-qr', 'Clipboard: ' + (text || '(empty)'));
    elog('Clipboard read: ' + (text || '(empty)'));
  });
}

// ─── CloudStorage ───
function csSave() {
  var k = document.getElementById('cs-key').value;
  var v = document.getElementById('cs-val').value;
  tg.CloudStorage.setItem(k, v, function(err, ok) {
    logTo('log-cloud', err ? 'SAVE ERR: ' + err : 'Saved ' + k + ' = ' + v);
  });
}
function csGet() {
  var k = document.getElementById('cs-key').value;
  tg.CloudStorage.getItem(k, function(err, val) {
    logTo('log-cloud', err ? 'GET ERR: ' + err : 'Got ' + k + ' = ' + JSON.stringify(val));
  });
}
function csKeys() {
  tg.CloudStorage.getKeys(function(err, keys) {
    logTo('log-cloud', err ? 'KEYS ERR: ' + err : 'Keys: ' + JSON.stringify(keys));
  });
}
function csDelete() {
  var k = document.getElementById('cs-key').value;
  tg.CloudStorage.removeItem(k, function(err, ok) {
    logTo('log-cloud', err ? 'DEL ERR: ' + err : 'Deleted ' + k);
  });
}

// ─── Write Access ───
function testWriteAccess() {
  tg.requestWriteAccess(function(ok) {
    logTo('log-write', 'Write access: ' + (ok ? 'GRANTED' : 'DENIED'));
    elog('Write access: ' + (ok ? 'granted' : 'denied'));
  });
}

// ─── Haptic ───
function haptic(type, style) {
  if (type === 'impact') tg.HapticFeedback.impactOccurred(style);
  else if (type === 'notification') tg.HapticFeedback.notificationOccurred(style);
  else tg.HapticFeedback.selectionChanged();
  elog('Haptic: ' + type + (style ? '(' + style + ')' : ''));
}

// ─── Biometry ───
function bioInit() {
  tg.BiometricManager.init(function() {
    var bm = tg.BiometricManager;
    logTo('log-bio', 'Init: available=' + bm.isInited +
      ', type=' + bm.biometricType + ', access=' + bm.isAccessGranted);
  });
}
function bioAuth() {
  tg.BiometricManager.authenticate({reason: 'Test authentication'}, function(ok, token) {
    logTo('log-bio', ok ? 'Auth OK, token: ' + token : 'Auth failed');
  });
}

// ─── Location ───
function locInit() {
  tg.LocationManager.init(function() {
    logTo('log-loc', 'Init: available=' + tg.LocationManager.isInited +
      ', access=' + tg.LocationManager.isAccessGranted);
  });
}
function locGet() {
  tg.LocationManager.getLocation(function(loc) {
    if (loc) {
      logTo('log-loc', 'Location: ' + loc.latitude + ', ' + loc.longitude);
    } else {
      logTo('log-loc', 'Location: denied or unavailable');
    }
  });
}

// ─── Links / Viewport ───
function testLink() {
  tg.openLink('https://github.com/maryny4/tgwebview');
}
function testExpand() {
  tg.expand();
  elog('Expand requested');
}
function testClose() {
  tg.enableClosingConfirmation();
  elog('Closing confirmation enabled — try closing the window');
}

// ─── Invoke Custom Method ───
function testInvoke() {
  var method = document.getElementById('invoke-method').value;
  var paramsStr = document.getElementById('invoke-params').value;
  var params;
  try { params = JSON.parse(paramsStr); } catch(e) {
    logTo('log-invoke', 'Invalid JSON params');
    return;
  }
  tg.invokeCustomMethod(method, params, function(err, result) {
    if (err) logTo('log-invoke', 'ERROR: ' + err);
    else logTo('log-invoke', 'Result: ' + JSON.stringify(result));
  });
}

// ─── Global event listener ───
tg.onEvent('viewportChanged', function(e) { elog('viewportChanged: ' + JSON.stringify(e)); });
tg.onEvent('themeChanged', function() { elog('themeChanged'); });
tg.onEvent('mainButtonClicked', function() { elog('mainButtonClicked'); });
tg.onEvent('backButtonClicked', function() { elog('backButtonClicked'); });
tg.onEvent('settingsButtonClicked', function() { elog('settingsButtonClicked'); });

tg.ready();
tg.expand();
</script>
</body>
</html>
